# GRPO config for Qwen2.5-0.5B (baseline agent)
# VRAM: ~3 GB on RTX 4060 8GB
model_name: "Qwen/Qwen2.5-0.5B-Instruct"
dataset_size: 2000
num_generations: 4             # 4 not 8 — less variance, more stable
max_completion_length: 128
learning_rate: 1.0e-6          # very conservative — prevents KL explosion
per_device_batch_size: 1
gradient_accumulation_steps: 2
lora_r: 16
lora_alpha: 16
max_seq_length: 640
seed: 42
