# GRPO config for Qwen2.5-1.5B (primary agent)
# VRAM: ~5 GB on RTX 4060 8GB — tight but fits
model_name: "Qwen/Qwen2.5-1.5B-Instruct"
dataset_size: 2000
num_generations: 4          # halved from 0.5B to fit VRAM
max_completion_length: 128
learning_rate: 3.0e-6       # slightly lower for larger model
per_device_batch_size: 1
gradient_accumulation_steps: 4
lora_r: 16
lora_alpha: 16
max_seq_length: 640
seed: 42
