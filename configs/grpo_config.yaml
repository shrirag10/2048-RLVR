# GRPO Configuration — LLM-RLVR Training
# Target: Qwen2.5-0.5B-Instruct on RTX 4060 (6GB VRAM)

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  max_seq_length: 512
  load_in_4bit: true

lora:
  r: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_generations: 8          # GRPO group size G
  max_completion_length: 256  # Max response tokens
  learning_rate: 5.0e-6
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  optim: adamw_8bit
  seed: 42

dataset:
  size: 10000
  stage_distribution:
    early: 0.3
    mid: 0.4
    late: 0.3

output:
  dir: logs/grpo
  save_steps: 500
  save_total_limit: 3
